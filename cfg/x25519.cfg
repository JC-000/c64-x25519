# x25519.cfg — ca65/ld65 linker configuration for the C64 X25519 implementation
#
# Memory layout mirrors the existing ACME build:
#   $0801       BASIC stub (SYS 2064)
#   $080D       Code entry area (start label at $0810)
#   $7800-$7BFF Quarter-square lookup tables (runtime-built by sqtab_init,
#               referenced by hardcoded addresses in mul_8x8.asm:11-12)
#
# PRG file has a 2-byte load address header ($01 $08) prepended by the
# LOADADDR segment, matching the stock c64-asm.cfg pattern.

FEATURES {
    STARTADDRESS: default = $0801;
}

SYMBOLS {
    __LOADADDR__: type = import;

    # As of v0.6 + c64-lib-contract §8.1 adoption, sqtab_lo / sqtab_hi
    # are source-level `.ifndef`-guarded equates in src/constants.s
    # (default $7800 / $7A00; override via
    # `ca65 --asm-define LIB_SHARED_SQTAB_BASE=$N`). They are NO
    # longer linker-exported here. The SQTAB MEMORY entry below
    # remains as a default-address reservation for the standalone
    # `make` build; consumers that override the base must supply
    # their own cfg with a matching reservation.
}

MEMORY {
    # Zero page: $02-$FE. ZP usage is defined via constants in source,
    # not via linker allocation — but ld65 needs the region for the
    # ZEROPAGE segment type.
    ZP:       file = "",  start = $0002, size = $00FD, define = yes;

    # 2-byte PRG load address header (written to file before MAIN)
    LOADADDR: file = %O,  start = %S - 2, size = $0002;

    # Main memory: BASIC stub + code + rodata + data, up to just before
    # the quarter-square tables at $7800.
    MAIN:     file = %O,  start = %S,     size = $7800 - %S;

    # Quarter-square tables: sqtab_lo at $7800 (256 B), sqtab_hi at
    # $7A00 (256 B). Total reserved region is $0400. These are built at
    # runtime by sqtab_init; the linker just reserves the address space
    # so nothing else lands here. Type bss => no bytes in PRG.
    SQTAB:    file = "",  start = $7800,  size = $0400, define = yes;
}

SEGMENTS {
    # ZP segment for any zero-page labels (optional; we mostly use constants)
    ZEROPAGE:  load = ZP,       type = zp,  optional = yes;

    # 2-byte load address ($01 $08)
    LOADADDR:  load = LOADADDR, type = ro;

    # 12-byte BASIC SYS 2064 stub at $0801
    BASICSTUB: load = MAIN,     type = ro;

    # Executable code (entry point start: at $0810)
    CODE:      load = MAIN,     type = rw;

    # Read-only lookup tables: mul38_lo/hi_tab, sqr_lo/hi, a24_b0..b3,
    # sqtab2_lo/hi, mul_dma_lo/hi/carry, etc.
    RODATA:    load = MAIN,     type = ro,  optional = yes;

    # Page-aligned 32-byte field buffers (fe_tmp*, x25_*, fe_p, etc.)
    # and any other mutable data.  The source must use .align 256 to
    # ensure each buffer page starts on a $xx00 boundary.
    DATA:      load = MAIN,     type = rw,  optional = yes, align = 256;

    # Uninitialised data
    BSS:       load = MAIN,     type = bss, optional = yes, define = yes;

    # Quarter-square table reservation ($7800). No file output.
    SQTAB:     load = SQTAB,    type = bss, optional = yes, define = yes;
}

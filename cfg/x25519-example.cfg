# x25519-example.cfg — STARTER ld65 linker config for downstream consumers
#
# This is a reasonable starting point for a project that links against
# libx25519.a. It is NOT prescriptive — adapt the memory map to your
# application's needs. The key constraints the library imposes are:
#
#   1. A CODE segment for library code.
#   2. A DATA segment with `align = 256` (page alignment). The library's
#      data.s uses .align 256 to guarantee 32-byte field buffers land
#      at offsets $00/$20/$40/$60/$80/$A0/$C0/$E0 within a page, which
#      is required by the self-modifying abs,Y addressing in
#      fe25519_add / fe25519_sub / fe25519_reduce_final.
#   3. A SQTAB region reserving $7800-$7BFF for the runtime-built
#      quarter-square multiply tables (see mul_8x8.s). The library
#      references these addresses directly, so nothing else may be
#      placed there.
#   4. A ZEROPAGE region — the library owns $14-$2E and $40-$7F while
#      running; see src/x25519.inc for the full map.
#
# This example builds a traditional BASIC-stub PRG that loads at $0801
# and enters at $0810 (SYS 2064). For a non-BASIC or relocatable
# downstream project, adjust LOADADDR/MAIN/BASICSTUB accordingly.

FEATURES {
    STARTADDRESS: default = $0801;
}

SYMBOLS {
    __LOADADDR__: type = import;
}

MEMORY {
    ZP:       file = "",  start = $0002, size = $00FD, define = yes;
    LOADADDR: file = %O,  start = %S - 2, size = $0002;
    MAIN:     file = %O,  start = %S,     size = $7800 - %S;
    SQTAB:    file = "",  start = $7800,  size = $0400, define = yes;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,       type = zp,  optional = yes;
    LOADADDR:  load = LOADADDR, type = ro;
    BASICSTUB: load = MAIN,     type = ro,  optional = yes;
    CODE:      load = MAIN,     type = rw;
    RODATA:    load = MAIN,     type = ro,  optional = yes;
    DATA:      load = MAIN,     type = rw,  optional = yes, align = 256;
    BSS:       load = MAIN,     type = bss, optional = yes, define = yes;
    SQTAB:     load = SQTAB,    type = bss, optional = yes, define = yes;
}
